name: "Agent Card README Generator"
description: "Render a Markdown README from an A2A AgentCard JSON. Post as PR comment or commit to a target path."
author: "mizcausevic-dev"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  card-path:
    description: "Path (relative to repo root) to the AgentCard JSON file."
    required: true
  output-path:
    description: "Optional. If set, the rendered Markdown is written to this path (relative to repo root). Useful for auto-updating a README or docs page."
    required: false
  comment-on-pr:
    description: "Post the rendered Markdown as a PR comment. 'auto' (default) posts only on pull_request events; 'true' / 'false' force the behavior."
    required: false
    default: "auto"
  hide-badges:
    description: "Suppress the trailing badges line under the title (default 'false')."
    required: false
    default: "false"
  anchor-prefix:
    description: "Anchor prefix for tool / refusal section headings (default 'section-')."
    required: false
    default: "section-"
  github-token:
    description: "Token used to post the PR comment (defaults to GITHUB_TOKEN)."
    required: false
    default: ${{ github.token }}

outputs:
  markdown-length:
    description: "Length (in characters) of the rendered Markdown."
  output-written:
    description: "True iff an output-path was specified and successfully written."

runs:
  using: "node20"
  main: "dist/index.js"
